#GENERALES
spring.config.import=optional:file:.env[.properties]
spring.application.name=D'Vita
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

server.error.include-message=always

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

#PDF SERVICE
pdf.service.url=${PDF_SERVICE_URL:http://localhost:3005}

#API RENIEC (opcional - se desactiva si no hay token)
reniec.api.url=${RENIEC_API_URL:}
reniec.api.token=${RENIEC_API_TOKEN:}

#GMAIL SMTP (opcional)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=juniorfernandozumaetagolac@gmail.com
spring.mail.password=${GMAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true