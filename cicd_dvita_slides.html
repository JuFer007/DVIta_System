<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CI/CD Pipeline · DVIta System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0D1117;
    --surface:#161B22;
    --surface-2:#1C2330;
    --border:#30363D;
    --text:#E6EDF3;
    --text-dim:#8B949E;
    --green:#3FB950;
    --amber:#D29922;
    --blue:#58A6FF;
    --purple:#BC8CFF;
    --red:#F85149;
    --mono:'IBM Plex Mono', monospace;
    --sans:'Inter', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden;}

  .deck{position:relative;width:100%;height:100vh;display:flex;flex-direction:column;}

  .tracker{display:flex;align-items:center;gap:6px;padding:14px 28px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;overflow-x:auto;}
  .tracker .brand{font-family:var(--mono);font-size:12px;color:var(--text-dim);letter-spacing:.08em;margin-right:18px;white-space:nowrap;}
  .stage{display:flex;align-items:center;gap:8px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--text-dim);white-space:nowrap;transition:all .35s ease;}
  .stage .dot{width:6px;height:6px;border-radius:50%;background:var(--text-dim);transition:all .35s ease;}
  .stage.active{color:var(--bg);background:var(--accent-color, var(--green));border-color:var(--accent-color, var(--green));font-weight:600;}
  .stage.active .dot{background:var(--bg);}
  .stage.done{color:var(--green);border-color:rgba(63,185,80,.4);}
  .stage.done .dot{background:var(--green);}
  .chevron{color:var(--border);font-size:11px;}

  .viewport{flex:1;position:relative;overflow:hidden;}
  .slide{position:absolute;inset:0;padding:48px 64px 40px;display:none;opacity:0;transform:translateX(24px);transition:opacity .4s ease, transform .4s ease;overflow-y:auto;}
  .slide.active{display:block;opacity:1;transform:translateX(0);}

  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.12em;color:var(--accent-color,var(--blue));text-transform:uppercase;margin-bottom:10px;}
  h1{font-family:var(--mono);font-weight:700;font-size:clamp(28px,3.4vw,46px);margin:0 0 6px;line-height:1.1;letter-spacing:-.01em;}
  h2.sub{font-family:var(--sans);font-weight:400;font-size:16px;color:var(--text-dim);margin:0 0 28px;max-width:760px;}

  .grid{display:grid;gap:20px;}
  .cols-2{grid-template-columns:1fr 1fr;}
  .cols-3{grid-template-columns:repeat(3,1fr);}
  .cols-4{grid-template-columns:repeat(4,1fr);}
  .cols-5{grid-template-columns:repeat(5,1fr);}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;}
  .card .icon{width:30px;height:30px;margin-bottom:12px;color:var(--accent-color,var(--blue));}
  .card h3{font-family:var(--mono);font-size:14px;margin:0 0 8px;color:var(--text);}
  .card p{font-size:13px;line-height:1.55;color:var(--text-dim);margin:0;}
  .card .tag-sm{display:inline-block;font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:3px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-dim);margin-top:8px;}

  ul.feat{list-style:none;margin:0;padding:0;}
  ul.feat li{position:relative;padding-left:22px;margin-bottom:10px;font-size:14.5px;line-height:1.5;color:var(--text);}
  ul.feat li::before{content:"\203A";position:absolute;left:0;color:var(--accent-color,var(--green));font-weight:700;}

  .terminal{background:#0A0D12;border:1px solid var(--border);border-radius:8px;font-family:var(--mono);font-size:12.5px;overflow:hidden;}
  .terminal-head{display:flex;gap:6px;padding:9px 12px;border-bottom:1px solid var(--border);}
  .terminal-head span{width:9px;height:9px;border-radius:50%;background:#30363D;}
  .terminal-body{padding:14px 16px;}
  .terminal-body .ln{display:flex;gap:10px;padding:3px 0;color:var(--text-dim);}
  .terminal-body .ln .n{color:#3A4150;min-width:14px;text-align:right;}
  .terminal-body .ln .cmd{color:var(--green);}
  .terminal-body .ln .cmt{color:var(--text-dim);}

  .flow{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
  .flow .node{flex:1;min-width:120px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 12px;text-align:center;font-family:var(--mono);font-size:12px;}
  .flow .node b{display:block;font-size:13px;margin-bottom:3px;color:var(--text);}
  .flow .arrow{color:var(--text-dim);font-size:18px;flex:0 0 auto;}

  .badge{display:inline-block;font-family:var(--mono);font-size:10.5px;padding:2px 8px;border-radius:4px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-dim);margin-right:6px;}

  .archrow{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
  .archrow .svc{flex:0 0 220px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;}
  .archrow .svc b{font-family:var(--mono);font-size:13px;display:block;}
  .archrow .svc small{color:var(--text-dim);font-size:11.5px;}
  .archrow .line{flex:1;height:1px;background:repeating-linear-gradient(90deg,var(--border) 0 6px, transparent 6px 10px);position:relative;}
  .archrow .line::after{content:"\2192";position:absolute;right:-2px;top:-9px;color:var(--text-dim);}
  .archrow .host{flex:0 0 130px;font-family:var(--mono);font-size:12px;color:var(--accent-color,var(--blue));text-align:right;}

  .checklist{display:grid;grid-template-columns:1fr 1fr;gap:12px 28px;}
  .checklist .item{display:flex;gap:10px;align-items:flex-start;font-size:14px;}
  .checklist .item .ok{color:var(--green);font-weight:700;}

  .cover{height:100%;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;}
  .cover .tag{font-family:var(--mono);font-size:13px;color:var(--blue);letter-spacing:.14em;margin-bottom:18px;}
  .cover h1{font-size:clamp(38px,6vw,64px);}
  .cover .sub2{font-size:18px;color:var(--text-dim);max-width:620px;margin-top:14px;}
  .cover .stack-row{display:flex;gap:10px;margin-top:34px;flex-wrap:wrap;}

  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{background:var(--surface-2);padding:10px 14px;text-align:left;font-family:var(--mono);font-size:11px;color:var(--text-dim);font-weight:500;border-bottom:1px solid var(--border);}
  td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text);}
  tr:last-child td{border-bottom:none;}

  .pill{display:inline-block;padding:2px 8px;border-radius:10px;font-family:var(--mono);font-size:10px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-dim);}
  .pill.green{background:rgba(63,185,80,.15);border-color:rgba(63,185,80,.3);color:var(--green);}
  .pill.red{background:rgba(248,81,73,.15);border-color:rgba(248,81,73,.3);color:var(--red);}
  .pill.amber{background:rgba(210,153,34,.15);border-color:rgba(210,153,34,.3);color:var(--amber);}
  .pill.purple{background:rgba(188,140,255,.15);border-color:rgba(188,140,255,.3);color:var(--purple);}
  .pill.blue{background:rgba(88,166,255,.15);border-color:rgba(88,166,255,.3);color:var(--blue);}

  .footnote{margin-top:22px;font-size:12px;color:#5b6472;font-style:italic;}

  .controls{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;}
  .controls .left{display:flex;gap:8px;align-items:center;}
  .controls button{background:var(--surface-2);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:12px;padding:8px 16px;border-radius:6px;cursor:pointer;transition:background .2s;}
  .controls button:hover{background:#262C38;}
  .controls button:focus-visible{outline:2px solid var(--blue);outline-offset:2px;}
  .controls button:disabled{opacity:.35;cursor:default;}
  .dots{display:flex;gap:6px;}
  .dots .d{width:7px;height:7px;border-radius:50%;background:var(--border);cursor:pointer;transition:background .2s;}
  .dots .d.on{background:var(--blue);}
  .counter{font-family:var(--mono);font-size:12px;color:var(--text-dim);}

  .icon svg{width:100%;height:100%;}
</style>
</head>
<body>

<div class="deck">

  <div class="tracker" id="tracker">
    <span class="brand">DVITA_SYSTEM // CI-CD</span>
  </div>

  <div class="viewport" id="viewport"></div>

  <div class="controls">
    <div class="left">
      <button id="prevBtn">&larr; Anterior</button>
      <button id="nextBtn">Siguiente &rarr;</button>
    </div>
    <div class="dots" id="dots"></div>
    <div class="counter" id="counter">1 / 16</div>
  </div>

</div>

<script>
const STAGES = [
  {key:'commit', label:'COMMIT', color:'var(--purple)'},
  {key:'ci',     label:'CI BUILD', color:'var(--green)'},
  {key:'docker', label:'DOCKER', color:'var(--amber)'},
  {key:'deploy', label:'DEPLOY', color:'var(--blue)'},
  {key:'watch',  label:'OBSERV', color:'#F778BA'},
];

const ICONS = {
  layers:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 3 2 8l10 5 10-5-10-5Z"/><path d="m2 14 10 5 10-5"/><path d="m2 11 10 5 10-5"/></svg>',
  window:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 8h18"/><circle cx="6" cy="6" r=".6" fill="currentColor" stroke="none"/></svg>',
  chat:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 12a8 8 0 1 1-3.2-6.4L21 4l-1 4.2A7.9 7.9 0 0 1 21 12Z"/></svg>',
  doc:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M6 2h9l5 5v15H6z"/><path d="M15 2v5h5"/><path d="M9 13h6M9 17h6"/></svg>',
  db:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><ellipse cx="12" cy="5" rx="8" ry="3"/><path d="M4 5v14c0 1.7 3.6 3 8 3s8-1.3 8-3V5"/><path d="M4 12c0 1.7 3.6 3 8 3s8-1.3 8-3"/></svg>',
  box:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="m21 8-9-5-9 5 9 5 9-5Z"/><path d="M3 8v8l9 5 9-5V8"/><path d="M12 13v8"/></svg>',
  cloud:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M7 18a4.5 4.5 0 0 1-.4-9 5.5 5.5 0 0 1 10.6-1.6A4 4 0 0 1 17 18H7Z"/></svg>',
  clock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="m20 6-11 11-5-5"/></svg>',
  lock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>',
  branch:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="6" cy="5" r="2.2"/><circle cx="6" cy="19" r="2.2"/><circle cx="18" cy="12" r="2.2"/><path d="M6 7.2V16.8"/><path d="M6 9c0 4 6 4 10 3"/></svg>',
  gauge:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 18a8 8 0 1 1 16 0"/><path d="M12 18 16 9"/></svg>',
  shield:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 2 3 7v5c0 5 3.5 10 9 12 5.5-2 9-7 9-12V7l-9-5Z"/><path d="M9 12 11 14 15 10"/></svg>',
  bell:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M18 8a6 6 0 0 0-12 0c0 4-2 6-2 6h16s-2-2-2-6"/><path d="M9.5 18a2.5 2.5 0 0 0 5 0"/></svg>',
  refresh:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>',
  list:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 6h16"/><path d="M4 12h16"/><path d="M4 18h16"/></svg>',
  alert:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 2 2 20h20L12 2Z"/><path d="M12 9v4"/><path d="M12 17v.01"/></svg>',
};
function icon(name){return `<span class="icon">${ICONS[name]}</span>`;}

const slides = [

// 1 — PORTADA
{
  stage:null, accent:'var(--blue)',
  html:`
  <div class="cover">
    <div class="tag">PROYECTO ACADEMICO &bull; UTP CHICLAYO</div>
    <h1>CI/CD Pipeline<br>DVIta&nbsp;System</h1>
    <p class="sub2">Automatizacion de integracion, construccion, publicacion y despliegue continuo para una aplicacion multi-servicio.</p>
    <div class="stack-row">
      <span class="badge">GitHub Actions</span>
      <span class="badge">Docker</span>
      <span class="badge">Docker Hub</span>
      <span class="badge">Render</span>
      <span class="badge">Vercel</span>
      <span class="badge">Trivy</span>
      <span class="badge">Dependabot</span>
    </div>
  </div>`
},

// 2 — ARQUITECTURA
{
  stage:null, accent:'var(--blue)',
  html:`
  <div class="eyebrow">Arquitectura</div>
  <h1>Que servicios componen el sistema?</h1>
  <h2 class="sub">Cuatro servicios independientes, cada uno con su propio pipeline de CI, orquestados con Docker Compose.</h2>
  <div class="archrow"><div class="svc">${icon('window')}<b>Frontend</b><small>React 18 + TS + Vite + Tailwind</small></div><div class="line"></div><div class="host">Vercel</div></div>
  <div class="archrow"><div class="svc">${icon('layers')}<b>Backend</b><small>Spring Boot 4 / Java 21 + Maven</small></div><div class="line"></div><div class="host">Render</div></div>
  <div class="archrow"><div class="svc">${icon('chat')}<b>Chatbot</b><small>FastAPI + Python 3.12 + Ollama</small></div><div class="line"></div><div class="host">Render</div></div>
  <div class="archrow"><div class="svc">${icon('doc')}<b>PDF Server</b><small>Express + Node 20 + Puppeteer</small></div><div class="line"></div><div class="host">Render</div></div>
  <div class="archrow"><div class="svc">${icon('db')}<b>MySQL 8.0</b><small>Base de datos relacional</small></div><div class="line"></div><div class="host">Local / Railway</div></div>
  <p style="margin-top:12px;font-size:13px;color:var(--text-dim);">Modulo de <b style="color:var(--text);">Incidencias</b> integrado en backend + PDF Server para generacion de reportes.</p>`
},

// 3 — VISION GENERAL
{
  stage:null, accent:'var(--green)',
  html:`
  <div class="eyebrow">Pipeline</div>
  <h1>Vision general: del commit a produccion</h1>
  <h2 class="sub">Cada servicio se valida por separado. Al integrar en <b style="color:var(--text)">main</b> se construyen, escanean y publican las imagenes, y un despliegue automatico las lleva a produccion.</h2>
  <div class="flow">
    <div class="node">${icon('branch')}<b>Commit / Push</b>GitHub</div>
    <div class="arrow">&rarr;</div>
    <div class="node">${icon('gauge')}<b>GitHub Actions</b>orquestador</div>
    <div class="arrow">&rarr;</div>
    <div class="node">${icon('check')}<b>Build + Test</b>4 pipelines CI</div>
    <div class="arrow">&rarr;</div>
    <div class="node">${icon('shield')}<b>Trivy</b>escaneo seguridad</div>
    <div class="arrow">&rarr;</div>
    <div class="node">${icon('box')}<b>Docker Hub</b>4 imagenes</div>
    <div class="arrow">&rarr;</div>
    <div class="node">${icon('cloud')}<b>Render / Vercel</b>produccion</div>
  </div>
  <ul class="feat" style="margin-top:30px;">
    <li>Cada servicio tiene su propio CI: build, lint y test independientes.</li>
    <li>Al mergear a <b style="color:var(--text)">main</b>, se construyen, escanean con Trivy y publican las imagenes en Docker Hub con tags <code>:latest</code>, <code>:SHA</code> y <code>:previous</code>.</li>
    <li>El despliegue requiere <b style="color:var(--text);">aprobacion manual</b> (approval gate) y hace health check + rollback automatico si falla.</li>
    <li>Notificaciones de fallo via commit status + Slack opcional.</li>
  </ul>`
},

// 4 — CI FRONTEND
{
  stage:'ci', accent:'var(--green)',
  html:`
  <div class="eyebrow">CI &middot; frontend.yml</div>
  <h1>CI de Frontend</h1>
  <h2 class="sub">Trigger: push a <b style="color:var(--text)">main</b>/<b style="color:var(--text)">develop</b> o PR a main, cambios en <code>frontend/</code> &middot; Stack: Node.js 22, npm</h2>
  <div class="grid cols-2">
    <div class="terminal">
      <div class="terminal-head"><span></span><span></span><span></span></div>
      <div class="terminal-body">
        <div class="ln"><span class="n">1</span><span class="cmd">$ npm ci</span><span class="cmt"> &middot; instalacion limpia</span></div>
        <div class="ln"><span class="n">2</span><span class="cmd">$ npm run lint</span><span class="cmt"> &middot; ESLint</span></div>
        <div class="ln"><span class="n">3</span><span class="cmd">$ npx tsc --noEmit</span><span class="cmt"> &middot; type checking</span></div>
        <div class="ln"><span class="n">4</span><span class="cmd">$ npm run build</span><span class="cmt"> &middot; build Vite</span></div>
        <div class="ln"><span class="n">5</span><span class="cmd">$ upload-artifact</span><span class="cmt"> &middot; frontend-dist</span></div>
      </div>
    </div>
    <div class="card">
      <div class="icon">${icon('window')}</div>
      <h3>Que valida</h3>
      <p>Instalacion reproducible, calidad ESLint, tipado estricto TypeScript y build de produccion.</p>
      <span class="tag-sm">Notifica fallo + Slack opcional</span>
    </div>
  </div>`
},

// 5 — CI BACKEND
{
  stage:'ci', accent:'var(--green)',
  html:`
  <div class="eyebrow">CI &middot; backend.yml</div>
  <h1>CI de Backend</h1>
  <h2 class="sub">Trigger: push a main/develop o PR a main, cambios en <code>backend/</code> o <code>pom.xml</code> &middot; Stack: Java 21 (Temurin) + Maven</h2>
  <div class="grid cols-2">
    <div class="terminal">
      <div class="terminal-head"><span></span><span></span><span></span></div>
      <div class="terminal-body">
        <div class="ln"><span class="n">1</span><span class="cmd">$ mvn clean verify</span><span class="cmt"> &middot; tests + jacoco:report</span></div>

        <div class="ln"><span class="n">4</span><span class="cmd">$ upload-artifact</span><span class="cmt"> &middot; backend-coverage</span></div>
      </div>
    </div>
    <div class="card">
      <div class="icon">${icon('layers')}</div>
      <h3>Que valida</h3>
      <p>Tests JUnit 5, cobertura JaCoCo (H2 en memoria), JAR compilado.</p>
      <span class="tag-sm">Notifica fallo + Slack opcional</span>
    </div>
  </div>`
},

// 6 — CI CHATBOT
{
  stage:'ci', accent:'var(--green)',
  html:`
  <div class="eyebrow">CI &middot; chatbot.yml</div>
  <h1>CI de Chatbot</h1>
  <h2 class="sub">Trigger: push a main/develop o PR a main, cambios en <code>chatBot/</code> &middot; Stack: Python 3.12 + pip + pytest</h2>
  <div class="grid cols-2">
    <div class="terminal">
      <div class="terminal-head"><span></span><span></span><span></span></div>
      <div class="terminal-body">
        <div class="ln"><span class="n">1</span><span class="cmd">$ pip install -r requirements.txt</span></div>
        <div class="ln"><span class="n">2</span><span class="cmd">$ pip install pytest pytest-cov</span></div>
        <div class="ln"><span class="n">3</span><span class="cmd">$ pytest --cov --cov-report=xml</span><span class="cmt"> &middot; 30 tests</span></div>
        <div class="ln"><span class="n">4</span><span class="cmd">$ upload-artifact</span><span class="cmt"> &middot; chatbot-coverage</span></div>
      </div>
    </div>
    <div class="card">
      <div class="icon">${icon('chat')}</div>
      <h3>Que valida</h3>
      <p>30 tests unitarios (intenciones + parser fechas) con cobertura pytest-cov.</p>
      <span class="tag-sm">Notifica fallo + Slack opcional</span>
    </div>
  </div>`

// ---------- Render ----------
const viewport = document.getElementById('viewport');
const trackerEl = document.getElementById('tracker');
const dotsEl = document.getElementById('dots');
const counterEl = document.getElementById('counter');
let current = 0;

slides.forEach((s,i)=>{
  const div = document.createElement('div');
  div.className = 'slide' + (i===0?' active':'');
  div.style.setProperty('--accent-color', s.accent);
  div.innerHTML = s.html;
  viewport.appendChild(div);

  const dot = document.createElement('div');
  dot.className = 'd' + (i===0?' on':'');
  dot.addEventListener('click',()=>go(i));
  dotsEl.appendChild(dot);
});

STAGES.forEach(st=>{
  const pill = document.createElement('div');
  pill.className = 'stage';
  pill.id = 'stage-'+st.key;
  pill.style.setProperty('--accent-color', st.color);
  pill.innerHTML = '<span class="dot"></span>'+st.label;
  trackerEl.appendChild(pill);
});

function updateTracker(stageKey){
  const idx = STAGES.findIndex(s=>s.key===stageKey);
  STAGES.forEach((st,i)=>{
    const el = document.getElementById('stage-'+st.key);
    el.classList.remove('active','done');
    if(stageKey===null) return;
    if(i<idx) el.classList.add('done');
    if(i===idx) el.classList.add('active');
  });
}

function go(i){
  if(i<0||i>=slides.length) return;
  document.querySelectorAll('.slide')[current].classList.remove('active');
  document.querySelectorAll('.d')[current].classList.remove('on');
  current = i;
  document.querySelectorAll('.slide')[current].classList.add('active');
  document.querySelectorAll('.d')[current].classList.add('on');
  counterEl.textContent = (current+1)+' / '+slides.length;
  updateTracker(slides[current].stage);
  document.getElementById('prevBtn').disabled = current===0;
  document.getElementById('nextBtn').disabled = current===slides.length-1;
}

document.getElementById('prevBtn').addEventListener('click',()=>go(current-1));
document.getElementById('nextBtn').addEventListener('click',()=>go(current+1));
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight') go(current+1);
  if(e.key==='ArrowLeft') go(current-1);
});

go(0);
</script>
