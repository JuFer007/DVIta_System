name: Chatbot CI

on:
  workflow_dispatch:
  push:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Set pending status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: '${{ github.workflow }}',
              description: 'Ejecutando…'
            });

      - run: pip install -r chatBot/requirements.txt
      - run: pip install pytest pytest-cov
      - run: pytest --cov=. --cov-report=xml --cov-report=term
        working-directory: chatBot
      - uses: actions/upload-artifact@v4
        with:
          name: chatbot-coverage
          path: chatBot/coverage.xml

      - name: Set success status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: '${{ github.workflow }}',
              description: 'Pasó Chatbot CI'
            });

      - name: Set failure status
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              context: '${{ github.workflow }}',
              description: 'Falló Chatbot CI'
            });

      - name: Notify Slack on failure
        if: failure() && env.HAS_SLACK_WEBHOOK == 'true'
        env:
          HAS_SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK != '' }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            text: "*${{ github.workflow }}* falló en `${{ github.ref }}`\nRepo: ${{ github.repository }}\nURL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
