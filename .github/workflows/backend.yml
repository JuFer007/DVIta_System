name: Backend CI

on:
  workflow_dispatch:
  push:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set pending status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: '${{ github.workflow }}',
              description: 'Ejecutando…'
            });

      - run: mvn clean verify
      - run: mvn package -DskipTests
      - uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: target/*.jar
      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: target/site/jacoco/**/*

      - name: Set success status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: '${{ github.workflow }}',
              description: 'Pasó Backend CI'
            });

      - name: Set failure status
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              context: '${{ github.workflow }}',
              description: 'Falló Backend CI'
            });

      - name: Notify Slack on failure
        if: failure() && env.HAS_SLACK_WEBHOOK == 'true'
        env:
          HAS_SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK != '' }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            text: "*${{ github.workflow }}* falló en `${{ github.ref }}`\nRepo: ${{ github.repository }}\nURL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
