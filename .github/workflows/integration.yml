name: Integration CI + CD

on:
  workflow_dispatch:
  push:

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

jobs:
  docker-build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set pending status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: '${{ github.workflow }}',
              description: 'Ejecutando…'
            });

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create .env file for docker-compose
        run: touch .env

      - name: Build images
        run: docker compose -p dvita_system build pdf-server backend chatbot frontend

      - name: Scan images with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: 'dvita_system-backend:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Save previous version and push all tags
        run: |
          for svc in pdf-server backend chatbot frontend; do
            img="dvita_system-$svc"
            hub="$DOCKER_USERNAME/d-vita-$svc"

            # Save current latest as previous (for rollback)
            docker pull "$hub:latest" 2>/dev/null && \
              docker tag "$hub:latest" "$hub:previous" && \
              docker push "$hub:previous" || true

            # Tag new version as latest and with commit SHA
            docker tag "$img" "$hub:latest"
            docker tag "$img" "$hub:${{ github.sha }}"
            docker push "$hub:latest"
            docker push "$hub:${{ github.sha }}"
          done

      - name: Set success status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: '${{ github.workflow }}',
              description: 'Pasó Integration CI + CD'
            });

      - name: Set failure status
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              context: '${{ github.workflow }}',
              description: 'Falló Integration CI + CD'
            });

      - name: Notify Slack on failure
        if: failure() && env.HAS_SLACK_WEBHOOK == 'true'
        env:
          HAS_SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK != '' }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            text: "*${{ github.workflow }}* falló en `${{ github.ref }}`\nRepo: ${{ github.repository }}\nURL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
